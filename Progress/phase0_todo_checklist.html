<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SciRet Research Tracker | Phase 0</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="phase0.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="brand">
          <div class="logo-area">
            <div class="logo-icon"><span>S</span></div>
            <h1 class="logo-text">SciRet V2</h1>
          </div>
          <p class="motto">
            Scientific Information Made Easy. Phase 0: Foundations, Multimodal
            Foundations, and Modern Information Retrieval.
          </p>
        </div>
        <div class="team-section">
          <span class="team-title">Research Team</span>
          <div class="teammates">
            <div class="teammate" title="User">Me</div>
            <div class="teammate add" title="Add Teammate">+</div>
          </div>
          <div class="sync">
            <div class="sync-dot"></div>
            <span>Session Active & Syncing</span>
          </div>
        </div>
      </header>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-num" id="s-done">0</div>
          <div class="stat-label">Tasks Done</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="s-total">0</div>
          <div class="stat-label">Total Scope</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="s-pct">0%</div>
          <div class="stat-label">Milestone Done</div>
        </div>
      </div>

      <div class="grid-container" id="lists"></div>
    </div>

    <script src="phase0.js"></script>
  </body>
</html>
